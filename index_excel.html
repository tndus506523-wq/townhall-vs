<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LG전자 VS본부 타운홀 미팅 사전 서베이</title>
    <!-- Google Fonts for modern typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Gaegu:wght@700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        // Inline transition logic to prevent ReferenceError if external JS fails to load
        function startSurvey() {
            console.log("Start survey button clicked (inline wrapper)");
            const cover = document.getElementById('cover-screen');
            const chat = document.getElementById('chat-screen');

            if (cover && chat) {
                cover.classList.add('fade-out');
                setTimeout(() => {
                    cover.style.display = 'none';
                    chat.classList.remove('hidden');
                    if (typeof initChat === 'function') {
                        initChat();
                    } else {
                        console.error("initChat not defined. External JS might have failed to load.");
                        alert("프로그램 로딩 중 오류가 발생했습니다. (404 Error)");
                    }
                }, 400);
            }
        }
    </script>
</head>

<body>

    <!-- ===== COVER SCREEN ===== -->
    <div id="cover-screen">
        <div class="cover-content">
            <div class="cover-logo">🐰</div>
            <p class="cover-sub">VS본부 타운홀 미팅</p>
            <h1 class="cover-title" style="font-family: 'Gaegu', cursive; font-size: 2.6rem; letter-spacing: 1px;">사전
                서베이 바로가기</h1>
            <div class="cover-date-badge">참여기간 : 3/17(금) ~ 3/19(수)</div>
            <button id="start-btn" onclick="startSurvey()">시작하기 🚀</button>
        </div>
    </div>

    <!-- ===== CHAT SCREEN (hidden until start) ===== -->
    <div class="chat-container hidden" id="chat-screen">
        <!-- Progress Bar -->
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <!-- Milestone Toast -->
        <div id="milestone-toast"></div>
        <!-- Header -->
        <header class="chat-header">
            <div class="header-info">
                <div class="avatar-header">
                    <div
                        style="width: 42px; height: 42px; border-radius: 50%; background-color: #fff0f3; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 10px rgba(165, 0, 52, 0.2);">
                        🐰
                    </div>
                </div>
                <div>
                    <h1
                        style="font-family: 'Caveat', cursive; font-size: 24px; color: #A50034; letter-spacing: 0.5px; margin-bottom: 0;">
                        VS Townhall Meeting</h1>
                    <span class="status-indicator"></span><span class="status-text">온라인</span>
                </div>
            </div>
        </header>

        <!-- Notice Bar -->
        <div class="notice-bar">
            📌 모든 입력 내용은 <strong><u>타운홀 사전서베이 데이터로 저장</u></strong>되며,<br>
            VS본부 경영진과 함께 검토 후 타운홀 미팅에서 논의될 예정입니다.
        </div>

        <!-- Chat Messages -->
        <main class="chat-messages" id="chat-messages">
            <!-- Messages will be injected here by app.js -->
        </main>

        <!-- Input Area -->
        <footer class="chat-input-area">
            <!-- Dynamic Input Container (Text or Choice) -->
            <div id="dynamic-input-container">
                <form id="chat-form" class="text-input-form">
                    <input type="text" id="user-input" placeholder="메시지를 입력하세요" autocomplete="off" required>
                    <button type="submit" id="send-button">
                        <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
            <div id="choice-input-container" class="choice-container hidden">
                <!-- Choice buttons injected here -->
            </div>
        </footer>
    </div>
    <script src="chatbot.js"></script>
</body>

</html>
